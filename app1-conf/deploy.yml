apiVersion: v1
kind: Namespace
metadata:
  name: jeet
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-web-app
  namespace: jeet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-web-app
  template:
    metadata:
      labels:
        app: go-web-app
    spec:
      containers:
        - name: go-web-app
          image: namejeetkansagra07/go-web-app:16513899341
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: go-web-app
  namespace: jeet
spec:
  selector:
    app: go-web-app
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP